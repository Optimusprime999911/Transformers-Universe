<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Add Transformer — Transformers Universe</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <script src="starfield.js"></script>
  <style>
    /* ensure starfield canvas is visible behind this page */
    html{background:#0d0d0d}
    body{background:transparent;position:relative;margin:0;color:var(--text)}
    header, main, footer, nav{position:relative;z-index:1}
    .form-main{max-width:760px;margin:28px auto;padding:0 16px}
    .form-card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.04)); border-radius:12px; padding:22px; box-shadow:0 10px 26px rgba(2,6,23,0.5); border:1px solid rgba(255,255,255,0.04)}
    .form-card h2{margin:0 0 10px 0}
    .field{margin-bottom:12px}
    .field label{display:block;font-weight:600;margin-bottom:6px;color:var(--text)}
    .field input[type="text"], .field textarea, .field input[type="file"]{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:var(--text);font-size:0.95rem}
    .buttons{display:flex;gap:10px;align-items:center;margin-top:12px}
    .btn-primary{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#001;padding:10px 14px;border-radius:8px;border:none;cursor:pointer;font-weight:600}
    .hint{color:var(--muted);margin-top:12px}
    .required{color:#ff7b7b;margin-left:6px}
    @media(max-width:600px){ .form-card{padding:16px} }
  </style>
</head>
  <body>
  <header>
    <h1>Add a Transformer</h1>
    <nav>
      <a href="/">Home</a>
      <a href="/upload">Add Transformer</a>
    </nav>
  </header>

  <main class="form-main">
    <div class="form-card">
      <h2>Add a Transformer</h2>
      <form id="uploadForm" action="/upload" method="post" enctype="multipart/form-data">
        <div class="field">
          <label>Name <span class="required">*</span></label>
          <input name="name" type="text" required />
        </div>

        <div class="field">
          <label>Type</label>
          <input name="type" type="text" placeholder="e.g., Autobot, Decepticon" />
        </div>

        <div class="field">
          <label>Category</label>
          <input name="category" type="text" placeholder="e.g., Warrior, Scout" />
        </div>

        <div class="field">
          <label>Description</label>
          <textarea name="description" rows="5" placeholder="Short description"></textarea>
        </div>

        <div class="field">
          <label>Image (optional)</label>
          <input name="image" type="file" accept="image/*" />
        </div>

        <div class="buttons">
          <button class="btn-primary" type="submit">Save Transformer</button>
          <a class="btn-link" href="/">Cancel</a>
        </div>
      </form>

      <p class="hint">Note: Images are stored in the server uploads folder.</p>
    </div>
  </main>

  <footer>
    <small>Images will be saved to an uploads folder on the server.</small>
  </footer>
</body>
</html>
