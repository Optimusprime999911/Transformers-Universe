<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Compare Transformers — Transformers Universe</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="starfield.js"></script>
  <style>
    :root{
      --bg:#081024; --card:#0b1220; --muted:#94a3b8; --accent:#60a5fa; --text:#e6eef7;
    }
    *{box-sizing:border-box}
    html{background:#0d0d0d}
    body{margin:0;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:transparent;color:var(--text);min-height:100vh;position:relative;z-index:1}
    header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.12);border-bottom:1px solid rgba(255,255,255,0.02);position:relative;z-index:2}
    header h1{margin:0;font-size:1.02rem}
    nav a{color:var(--muted); margin-left:12px; text-decoration:none}
    main{max-width:1100px;margin:20px auto;padding:18px;position:relative;z-index:1}
    .compare-card{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .panel{background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(0,0,0,0.04));padding:14px;border-radius:10px;border:1px solid rgba(255,255,255,0.02)}
    .img{height:220px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.02);border-radius:8px;overflow:hidden}
    .img img{max-width:100%;max-height:100%;object-fit:contain}
    h2.name{margin:10px 0 6px 0}
    .meta{color:var(--muted);font-size:0.9rem;margin-bottom:8px}
      .desc{color:#cfe6ff}
    .controls{display:flex;gap:10px;justify-content:flex-end;margin-bottom:12px}
    .btn{padding:8px 12px;border-radius:8px;border:none;cursor:pointer}
    .btn-back{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,0.04)}
    .btn-clear{background:linear-gradient(90deg,var(--accent),#4f46e5);color:#001}
    @media(max-width:900px){ .compare-card{grid-template-columns:1fr} .img{height:180px} }
    .field-row{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-top:1px dashed rgba(255,255,255,0.02)}
    .field-title{width:140px;color:var(--muted);font-weight:600}
    .field-value{flex:1}
  </style>
</head>
<body>
  <header>
    <h1>Transformers Universe</h1>
    <nav>
      <a href="/">Home</a>
      <a href="/upload">Add Transformer</a>
    </nav>
  </header>
  

  <main>
    <div class="controls">
      <button class="btn btn-back" onclick="location.href='/'">Back</button>
      <button class="btn btn-clear" id="clearAndBack">Clear selection & Back</button>
    </div>

    <div id="compareArea">
      <p style="color:var(--muted)">Loading comparison…</p>
    </div>
  </main>

  <script>
    // parse ids from querystring ?ids=1,2
    function qs(name) {
      const params = new URLSearchParams(location.search);
      return params.get(name);
    }

    function renderEmpty(msg) {
      document.getElementById("compareArea").innerHTML = '<p style="color:var(--muted)">'+msg+'</p>';
    }

    async function fetchItem(id) {
      const r = await fetch(`/api/transformers/${id}`);
      if (!r.ok) throw new Error("Not found: " + id);
      return await r.json();
    }

    (async function(){
      const raw = qs("ids");
      if (!raw) {
        renderEmpty("No items to compare. Select two transformers on the home page.");
        return;
      }
      const ids = raw.split(",").map(s => s.trim()).filter(Boolean);
      if (ids.length !== 2) {
        renderEmpty("Please select exactly 2 transformers to compare.");
        return;
      }

      try {
        const [a, b] = await Promise.all(ids.map(fetchItem));
        // build comparison UI
        const html = `
          <div class="compare-card">
            <div class="panel left">
              <div class="img">${a.image_url ? `<img src="${a.image_url}" alt="${a.name}">` : '<div style="color:var(--muted)">No image</div>'}</div>
              <h2 class="name">${escapeHtml(a.name)}</h2>
              <div class="meta">${escapeHtml(a.type || "")} ${a.type && a.category ? "•" : ""} ${escapeHtml(a.category || "")}</div>
              <div class="desc">${escapeHtml(a.description || "")}</div>
              <div style="margin-top:12px;color:var(--muted);font-size:0.85rem">Added: ${escapeHtml(a.created_at || "")}</div>
            </div>

            <div class="panel right">
              <div class="img">${b.image_url ? `<img src="${b.image_url}" alt="${b.name}">` : '<div style="color:var(--muted)">No image</div>'}</div>
              <h2 class="name">${escapeHtml(b.name)}</h2>
              <div class="meta">${escapeHtml(b.type || "")} ${b.type && b.category ? "•" : ""} ${escapeHtml(b.category || "")}</div>
              <div class="desc">${escapeHtml(b.description || "")}</div>
              <div style="margin-top:12px;color:var(--muted);font-size:0.85rem">Added: ${escapeHtml(b.created_at || "")}</div>
            </div>
          </div>

          <!-- structured field-by-field comparison -->
          <div style="margin-top:18px;background:transparent;border-radius:8px;padding:12px">
            <div class="field-row"><div class="field-title">Field</div><div class="field-value"><strong>Left</strong></div><div class="field-value" style="text-align:right"><strong>Right</strong></div></div>
            <div class="field-row"><div class="field-title">Name</div><div class="field-value">${escapeHtml(a.name)}</div><div class="field-value" style="text-align:right">${escapeHtml(b.name)}</div></div>
            <div class="field-row"><div class="field-title">Type</div><div class="field-value">${escapeHtml(a.type||'—')}</div><div class="field-value" style="text-align:right">${escapeHtml(b.type||'—')}</div></div>
            <div class="field-row"><div class="field-title">Category</div><div class="field-value">${escapeHtml(a.category||'—')}</div><div class="field-value" style="text-align:right">${escapeHtml(b.category||'—')}</div></div>
            <div class="field-row"><div class="field-title">Description</div><div class="field-value">${escapeHtml(a.description||'—')}</div><div class="field-value" style="text-align:right">${escapeHtml(b.description||'—')}</div></div>
          </div>
        `;
        document.getElementById("compareArea").innerHTML = html;

        // wire clear selection button (clears localStorage key used by index.js)
        document.getElementById("clearAndBack").addEventListener("click", () => {
          try { localStorage.removeItem("transformer_selection_v1"); } catch(e){}
          window.location.href = "/";
        });

      } catch (err) {
        console.error(err);
        renderEmpty("Failed to load one or more transformers. Make sure they exist.");
      }
    })();

    function escapeHtml(s) {
      if (!s) return "";
      return s.replace(/[&<>"']/g, function(m) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]; });
    }
  </script>
</body>
</html>
