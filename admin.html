<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Admin — Transformers</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="starfield.js"></script>
  <style>
    :root{--bg:#081024;--bg-end:#071028;--muted:#94a3b8;--accent:#60a5fa;--text:#e6eef7;--header-bg:rgba(0,0,0,0.12);--header-border:rgba(255,255,255,0.02)}
    *{box-sizing:border-box}
    html{background:#0d0d0d}
    body{margin:0;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:transparent;color:var(--text);position:relative;z-index:1}
    header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;background:var(--header-bg);backdrop-filter:blur(4px);border-bottom:1px solid var(--header-border);position:relative;z-index:2}
    nav a{color:var(--muted); margin-left:12px; text-decoration:none}
    main{max-width:1100px;margin:20px auto;padding:18px;position:relative;z-index:1}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .btn{padding:8px 12px;border-radius:8px;border:none;cursor:pointer}
    .btn-add{background:linear-gradient(90deg,var(--accent),#4f46e5);color:#001}
    .btn-logout{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,0.04)}
    .btn-home{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,0.04);margin-right:8px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
    .card{background:rgba(255,255,255,0.02);padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.02)}
    .card img{width:100%;height:140px;object-fit:cover;border-radius:6px}
    .meta{color:var(--muted);font-size:0.9rem;margin-top:6px}
    .controls{display:flex;gap:8px;margin-top:8px}
    .controls a, .controls button{padding:6px 8px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--muted);cursor:pointer;text-decoration:none}
    .btn-pwd{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,0.04);margin-right:8px}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;z-index:9999}
    .modal.show{display:flex}
    .modal-content{background:rgba(11,18,32,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:28px;max-width:400px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
    .modal h2{margin:0 0 20px 0;color:var(--text);font-size:1.3rem}
    .modal label{display:block;margin-bottom:16px}
    .modal label>div{font-size:0.9rem;margin-bottom:6px;color:var(--text);font-weight:500}
    .modal input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:var(--text);font-family:inherit;font-size:0.95rem}
    .modal input:focus{outline:none;border-color:var(--accent);background:rgba(255,255,255,0.03)}
    .modal-buttons{display:flex;gap:10px;margin-top:20px}
    .modal-buttons button{flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-weight:500}
    .modal-buttons .btn-submit{background:linear-gradient(90deg,var(--accent),#4f46e5);color:#001}
    .modal-buttons .btn-cancel{background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--muted)}
    .modal-error{color:#ff6b6b;font-size:0.9rem;margin-top:10px}
    .modal-success{color:#6ee7b7;font-size:0.9rem;margin-top:10px}
  </style>
</head>
<body>
  <header>
    <div style="display:flex;align-items:center;gap:14px"><strong>Admin Panel</strong></div>
    <div>
      <!-- Home link goes back to public homepage but does NOT log the admin out -->
      <a class="btn btn-home" href="/">Home</a>
      <button class="btn btn-pwd" id="changePwdBtn">Change Password</button>
      <a class="btn btn-logout" href="/admin/logout">Logout</a>
    </div>
  </header>

  <!-- Password Change Modal -->
  <div id="pwdModal" class="modal">
    <div class="modal-content">
      <h2>Change Password</h2>
      <form id="pwdForm">
        <label>
          <div>Current Password</div>
          <input type="password" name="oldPassword" required autocomplete="current-password" />
        </label>
        <label>
          <div>New Password</div>
          <input type="password" name="newPassword" required autocomplete="new-password" />
        </label>
        <label>
          <div>Confirm New Password</div>
          <input type="password" name="confirmPassword" required autocomplete="new-password" />
        </label>
        <div id="pwdMessage"></div>
        <div class="modal-buttons">
          <button type="submit" class="btn-submit">Change Password</button>
          <button type="button" class="btn-cancel" id="closePwdModal">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <main>
    <div class="top">
      <div style="color:var(--muted)">Manage Transformers (add, edit, delete)</div>
      <div>
        <a class="btn btn-add" href="/upload">Add Transformer</a>
      </div>
    </div>

    <section id="list" class="grid">
      <p style="color:var(--muted)">Loading…</p>
    </section>
  </main>

  <script>
    async function loadList(){
      const list = document.getElementById("list");
      list.innerHTML = '<p style="color:var(--muted)">Loading…</p>';
      try {
        const r = await fetch("/api/transformers");
        if (!r.ok) throw new Error("Fetch failed");
        const items = await r.json();
        if (!items.length) {
          list.innerHTML = '<p style="color:var(--muted)">No transformers yet.</p>';
          return;
        }
        list.innerHTML = "";
        items.forEach(it => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            ${it.image_url ? `<img src="${it.image_url}" alt="${it.name}">` : `<div style="height:140px;display:flex;align-items:center;justify-content:center;color:var(--muted)">No image</div>`}
            <h3 style="margin:8px 0 4px 0">${escapeHtml(it.name)}</h3>
            <div class="meta">${escapeHtml(it.type||'')} ${it.type && it.category ? ' • ' : ''} ${escapeHtml(it.category||'')}</div>
            <div style="margin-top:8px;color:#cfe6ff">${escapeHtml(it.description||'')}</div>
            <div class="controls">
              <a href="/edit/${it.id}">Edit</a>
              <button data-id="${it.id}" class="del">Delete</button>
            </div>
          `;
          list.appendChild(card);
        });

        document.querySelectorAll(".del").forEach(btn=>{
          btn.addEventListener("click", async () => {
            const id = btn.getAttribute("data-id");
            if (!confirm("Delete this transformer? This cannot be undone.")) return;
            const res = await fetch(`/api/transformers/${id}`, { method: "DELETE" });
            if (!res.ok) {
              const p = await res.json().catch(()=>({}));
              alert("Delete failed: " + (p.error || res.statusText));
              return;
            }
            loadList();
          });
        });

      } catch (err) {
        list.innerHTML = '<p style="color:var(--muted)">Failed to load list.</p>';
        console.error(err);
      }
    }

    function escapeHtml(s){ if (!s) return ""; return s.replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
    loadList();

    // Password change modal
    const pwdModal = document.getElementById('pwdModal');
    const changePwdBtn = document.getElementById('changePwdBtn');
    const closePwdModal = document.getElementById('closePwdModal');
    const pwdForm = document.getElementById('pwdForm');
    const pwdMessage = document.getElementById('pwdMessage');

    changePwdBtn.addEventListener('click', () => {
      pwdModal.classList.add('show');
      pwdForm.reset();
      pwdMessage.innerHTML = '';
    });

    closePwdModal.addEventListener('click', () => {
      pwdModal.classList.remove('show');
      pwdForm.reset();
      pwdMessage.innerHTML = '';
    });

    pwdModal.addEventListener('click', (e) => {
      if (e.target === pwdModal) {
        pwdModal.classList.remove('show');
        pwdForm.reset();
        pwdMessage.innerHTML = '';
      }
    });

    pwdForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const oldPassword = pwdForm.oldPassword.value.trim();
      const newPassword = pwdForm.newPassword.value.trim();
      const confirmPassword = pwdForm.confirmPassword.value.trim();

      // Validation
      if (!oldPassword || !newPassword || !confirmPassword) {
        pwdMessage.innerHTML = '<div class="modal-error">All fields are required.</div>';
        return;
      }

      if (newPassword !== confirmPassword) {
        pwdMessage.innerHTML = '<div class="modal-error">New passwords do not match.</div>';
        return;
      }

      if (newPassword.length < 6) {
        pwdMessage.innerHTML = '<div class="modal-error">New password must be at least 6 characters.</div>';
        return;
      }

      pwdMessage.innerHTML = '';
      const submitBtn = pwdForm.querySelector('button[type="submit"]');
      submitBtn.disabled = true;

      try {
        const res = await fetch('/admin/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ oldPassword, newPassword })
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          pwdMessage.innerHTML = `<div class="modal-error">${escapeHtml(data.error || 'Password change failed.')}</div>`;
          return;
        }

        pwdMessage.innerHTML = '<div class="modal-success">Password changed successfully!</div>';
        setTimeout(() => {
          pwdModal.classList.remove('show');
          pwdForm.reset();
          pwdMessage.innerHTML = '';
        }, 1500);
      } catch (err) {
        pwdMessage.innerHTML = '<div class="modal-error">Error: ' + escapeHtml(err.message) + '</div>';
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
 </body>
</html>
